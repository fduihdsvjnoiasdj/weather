<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Počasí</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a2a4a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/app-icon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Notification settings overlay -->
    <div id="notification-overlay" class="notification-overlay hidden">
      <div class="notification-overlay-inner"></div>
    </div>

    <!-- Search / City list overlay -->
    <div id="search-overlay" class="search-overlay hidden">
      <div class="search-overlay-inner">
        <h2 class="search-title">Počasí</h2>
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          <input id="search-input" type="text" placeholder="Hledat město nebo letiště" autocomplete="off" />
        </div>
        <div id="search-results" class="search-results"></div>
        <div id="city-list" class="city-list"></div>
      </div>
    </div>

    <!-- Main weather view -->
    <div id="weather-pages" class="weather-pages"></div>

    <!-- Bottom toolbar -->
    <nav class="bottom-bar">
      <button id="btn-map" class="bar-btn" type="button" title="Mapa">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/><line x1="9" y1="4" x2="9" y2="17"/><line x1="15" y1="7" x2="15" y2="20"/></svg>
      </button>
      <button id="btn-notifications" class="bar-btn" type="button" title="Upozornění">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <div id="page-dots" class="page-dots"></div>
      <button id="btn-list" class="bar-btn" type="button" title="Seznam měst">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
